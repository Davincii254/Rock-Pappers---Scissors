<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">

    <main class="bg-white p-6 sm:p-10 rounded-2xl shadow-2xl max-w-2xl w-full text-center border border-slate-100">

        <h1 class="text-3xl sm:text-4xl font-bold text-slate-800 mb-8 tracking-tight">Rock, Paper, Scissors</h1>

        <div class="choices flex justify-center gap-4 sm:gap-8 mb-8">
            <button onclick="playGame('rock', updateGameUI)" class="choice-btn bg-slate-100 text-5xl sm:text-7xl rounded-full w-28 h-28 sm:w-36 sm:h-36 flex items-center justify-center shadow-sm border-2 border-transparent">👊</button>
            <button onclick="playGame('paper', updateGameUI)" class="choice-btn bg-slate-100 text-5xl sm:text-7xl rounded-full w-28 h-28 sm:w-36 sm:h-36 flex items-center justify-center shadow-sm border-2 border-transparent">✋</button>
            <button onclick="playGame('scissors', updateGameUI)" class="choice-btn bg-slate-100 text-5xl sm:text-7xl rounded-full w-28 h-28 sm:w-36 sm:h-36 flex items-center justify-center shadow-sm border-2 border-transparent">✂️</button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xl font-semibold text-slate-600 mb-8">
            <div id="playerDisplay" class="bg-slate-50 p-4 rounded-lg border border-slate-200 shadow-inner">PLAYER:</div>
            <div id="computerDisplay" class="bg-slate-50 p-4 rounded-lg border border-slate-200 shadow-inner">COMPUTER:</div>
        </div>

        <div id="resultDisplay" class="text-4xl sm:text-5xl font-bold min-h-[60px] flex items-center justify-center mb-8 transition-colors duration-300">
            Make your move!
        </div>

        <div class="score-section border-t-2 border-slate-100 pt-6 flex justify-around text-lg">
            <div class="scoreDisplay font-semibold text-slate-700 bg-slate-50 py-3 px-6 rounded-xl shadow-sm border border-slate-100 w-2/5">
                Player
                <span id="playerScoreDisplay" class="font-bold text-3xl text-green-600 block mt-1">0</span>
            </div>
            <div class="scoreDisplay font-semibold text-slate-700 bg-slate-50 py-3 px-6 rounded-xl shadow-sm border border-slate-100 w-2/5">
                Computer
                <span id="computerScoreDisplay" class="font-bold text-3xl text-red-600 block mt-1">0</span>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
